<div>
    <label class="block text-sm font-medium text-slate-300 mb-2">Your Phone (For SMS Delivery)</label>
    <input type="tel" id="phone" placeholder="94772718608" 
           oninput="this.value = this.value.replace(/[^0-9]/g, '');"
           class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none text-white">
    <p class="text-[10px] text-slate-500 mt-1">* Enter digits only (e.g. 94771234567)</p>
</div>

<script>
    async function payNow() {
        const phone = document.getElementById('phone').value;
        const region = document.getElementById('region').value;
        const btn = document.getElementById('buyBtn');

        // අංක 10කට වඩා අඩු නම් බාරගන්නේ නැහැ
        if(phone.length < 10) { 
            alert("Please enter a valid phone number with country code (at least 10 digits)"); 
            return; 
        }

        btn.innerText = "Connecting...";
        btn.disabled = true;

        try {
            // අපි සෘජුවම API එකට කතා කරනවා
            const response = await fetch('http://173.249.28.120:8000/create-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_number: phone, region: region })
            });

            if (!response.ok) {
                throw new Error('Server responded with ' + response.status);
            }

            const data = await response.json();
            
            if(data.status === "success") {
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('payment-view').classList.remove('hidden');
                document.getElementById('qr-img').src = data.qr_code_url;
            } else {
                alert("Backend Error: " + data.message);
            }
        } catch (error) {
            console.error("Full Error:", error);
            // මෙතනදී අපි බලමු ඇයි බ්ලොක් වෙන්නේ කියලා
            alert("Connection Failed! Please make sure you have allowed 'Insecure Content' in your browser settings for this site.");
        } finally {
            btn.innerText = "Buy with Binance Pay";
            btn.disabled = false;
        }
    }
</script>
