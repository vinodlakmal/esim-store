<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merkei Mart | Premium eSIM Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass max-w-md w-full p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-blue-400">MERKEI MART</h1>
            <p class="text-slate-400 mt-2">Instant eSIM Activation via SMS</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Select Region</label>
                <select class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option>USA - Unlimited SMS ($5.00)</option>
                    <option>UK - Standard ($4.00)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Your Phone (For SMS Delivery)</label>
                <input type="text" placeholder="+1 234 567 890" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                Buy with Binance Pay
            </button>
        </div>

        <p class="text-center text-xs text-slate-500 mt-8 italic">
            Privacy First. No registration required.
        </p>
    </div>

</body>
</html>
