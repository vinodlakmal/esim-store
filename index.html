<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miracle | Premium eSIM Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .qr-border { border: 4px solid white; border-radius: 1rem; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass max-w-md w-full p-8 rounded-3xl shadow-2xl">
        <div id="setup-view">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black tracking-tighter text-blue-400">MIRACLE</h1>
                <p class="text-slate-400 mt-2 text-sm uppercase tracking-widest">Global eSIM Activation</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Select Region</label>
                    <select id="region" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none text-white">
                        <option value="USA">USA - Unlimited SMS ($5.00)</option>
                        <option value="UK">UK - Standard ($4.00)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Your Phone (For SMS Delivery)</label>
                    <input type="tel" id="phone" placeholder="94772718608" 
                           maxlength="15"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                           class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none text-white">
                </div>

                <p id="error-msg" class="text-red-400 text-sm text-center font-medium min-h-[20px]"></p>

                <button onclick="showPayment()" id="buyBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/20 uppercase">
                    Buy with USDT
                </button>
            </div>
        </div>

        <div id="payment-view" class="hidden text-center space-y-5">
            <h2 class="text-xl font-bold text-blue-400">Complete Payment</h2>
            <p class="text-xs text-yellow-500 font-bold uppercase">Network: TRON (TRC20)</p>
            
            <div class="bg-white p-3 inline-block qr-border shadow-inner">
                <img id="qr-img" src="qr-code.png" alt="Wallet QR" class="mx-auto w-44 h-44">
            </div>

            <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                <p class="text-[10px] text-slate-500 mb-1 uppercase font-bold">USDT Address (TRC20)</p>
                <code id="address-text" class="text-[11px] text-blue-300 break-all">TEmhVnX4dvNM2zmxgsJ5KT1G31izLe5KqG</code>
                <button onclick="copyAddress()" class="block mx-auto mt-2 text-[10px] bg-slate-700 px-3 py-1 rounded hover:bg-slate-600 uppercase">Copy Address</button>
            </div>

            <p class="text-[11px] text-slate-400 px-4">Pay exactly the amount. After sending, click the button below. We will verify and send your eSIM via SMS.</p>
            
            <button id="notifyBtn" onclick="notifyPaid()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl transition-all uppercase">
                I Have Paid
            </button>

            <button onclick="window.location.reload()" class="text-xs text-slate-500 hover:text-white transition-colors underline">Back to Order</button>
        </div>
    </div>

    <script>
        const API_URL = "https://esim.merkeisolutions.com"; // ටනල් එකේ ලින්ක් එක මෙතනට දාන්න

        function copyAddress() {
            const addr = document.getElementById('address-text').innerText;
            navigator.clipboard.writeText(addr);
            alert("Wallet Address Copied!");
        }

        function showPayment() {
            const phone = document.getElementById('phone').value;
            const errorMsg = document.getElementById('error-msg');
            if(phone.length < 10) { 
                errorMsg.innerText = "⚠️ Please enter a valid phone number.";
                return; 
            }
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('payment-view').classList.remove('hidden');
        }

        async function notifyPaid() {
            const phone = document.getElementById('phone').value;
            const region = document.getElementById('region').value;
            const btn = document.getElementById('notifyBtn');

            btn.innerText = "Notifying Admin...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/notify-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone_number: phone, region: region })
                });

                if (response.ok) {
                    alert("Success! David will check your payment and send the eSIM to " + phone + " shortly.");
                    window.location.reload();
                } else {
                    alert("Server error. Please try again.");
                }
            } catch (error) {
                alert("Connection failed. Check your internet.");
            } finally {
                btn.innerText = "I Have Paid";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
